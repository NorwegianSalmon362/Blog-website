---
layout: default
---
<article class="page">
  <header class="page-header">
    <p class="eyebrow">Page</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
